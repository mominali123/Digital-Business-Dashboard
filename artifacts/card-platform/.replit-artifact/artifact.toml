kind = "web"
previewPath = "/"
title = "Digital Business Card Platform"
version = "1.0.0"
id = "artifacts/card-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26209

[services.development]
run = "pnpm --filter @workspace/card-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/card-platform", "run", "build" ]
publicDir = "artifacts/card-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26209"
BASE_PATH = "/"
